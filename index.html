<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#002855">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Automoción">
  <title>Cuadrante Automoción</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon3-192.png">
  <link rel="apple-touch-icon" href="icon3-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #002855; }
    #splash {
      position: fixed; inset: 0; background: #002855;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s;
    }
    #splash img { width: 150px; height: 150px; border-radius: 30px; margin-bottom: 20px;
                  box-shadow: 0 8px 24px rgba(0,0,0,.45); }
    #splash p { color: #F5E200; font-family: Arial, sans-serif; font-size: 17px;
                font-weight: 700; letter-spacing: 2px; }
    #splash .spinner {
      width: 38px; height: 38px; border: 4px solid #1E3466;
      border-top-color: #F5E200; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-top: 26px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <div id="splash">
    <img src="icon3-192.png" alt="Cuadrante Automoción">
    <p>CUADRANTE AUTOMOCIÓN</p>
    <div class="spinner"></div>
  </div>
  <iframe id="app" src="https://script.google.com/macros/s/AKfycbzF9LO3O0v_kaHyFUlPfnmM--mRaPPNjDicmurNxX-0SnP358b4nnD7jnfJhhrwzB5r/exec" allowfullscreen
    allow="camera; microphone; geolocation"
    onload="document.getElementById('splash').style.opacity='0';setTimeout(()=>document.getElementById('splash').style.display='none',500)">
  </iframe>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }
  </script>
</body>
</html>
