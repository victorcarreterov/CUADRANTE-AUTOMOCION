<script>
// Si algo falla, mostrarlo en pantalla en lugar de dejar la pagina en blanco
window.onerror = function(msg, src, linea){
  var d = document.getElementById('errorGlobal') || document.createElement('div');
  d.id = 'errorGlobal';
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#FF0032;color:#fff;padding:10px 14px;font:13px sans-serif;z-index:999;';
  d.textContent = 'Error en la aplicacion: ' + msg + ' (linea ' + linea + ')';
  if(document.body) document.body.appendChild(d);
  return false;
};
</script>
<style>
:root{
  --azul:#002855; --amarillo:#F5E200; --rojo:#FF0032; --blanco:#FFFFFF;
  --gris:#8A94A6; --fondo:#EDF0F5; --verde:#1F9D55;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;background:var(--fondo);color:var(--azul);
     max-width:520px;margin:0 auto;display:flex;flex-direction:column;overflow-x:hidden}

/* ---------- Barra superior ---------- */
#barra{background:var(--azul);color:var(--blanco);padding:12px 14px;display:none;align-items:center;gap:10px;
       position:sticky;top:0;z-index:50;border-bottom:3px solid var(--amarillo)}
#barra button{background:none;border:none;color:var(--blanco);font-size:22px;padding:2px 8px}
#barraTitulo{font-size:17px;font-weight:700;letter-spacing:.3px;flex:1;text-transform:uppercase}

/* ---------- Vistas ---------- */
.vista{display:none;flex:1;padding:14px;padding-bottom:110px}
.vista.activa{display:block}

/* ---------- Login ---------- */
#vLogin{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;
        background:var(--azul);padding:24px;text-align:center}
#vLogin img{width:150px;margin-bottom:18px;filter:drop-shadow(0 6px 14px rgba(0,0,0,.45))}
#vLogin h1{color:var(--blanco);font-size:24px;text-transform:uppercase;letter-spacing:1px}
#vLogin h1 span{color:var(--amarillo)}
#vLogin p{color:#B9C4D6;font-size:14px;margin:6px 0 26px}
#vLogin input{width:100%;max-width:300px;padding:14px;font-size:20px;text-align:center;border:none;
              border-radius:12px;letter-spacing:6px}
#vLogin button{width:100%;max-width:300px;margin-top:14px;padding:14px;font-size:17px;font-weight:700;
               background:var(--amarillo);color:var(--azul);border:none;border-radius:12px;text-transform:uppercase}
#loginError{color:var(--rojo);background:var(--blanco);border-radius:8px;padding:8px 14px;margin-top:14px;
            font-weight:700;display:none;font-size:14px}

/* ---------- Menú principal ---------- */
.btnMenu{width:100%;background:var(--blanco);border:none;border-radius:16px;padding:16px;margin-bottom:14px;
         display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,40,85,.12);text-align:left}
.btnMenu:active{transform:scale(.98)}
.btnMenu img,.btnMenu .emoji{width:64px;height:64px;object-fit:contain;flex-shrink:0}
.btnMenu .emoji{font-size:48px;display:flex;align-items:center;justify-content:center}
.btnMenu b{display:block;font-size:17px;color:var(--azul);text-transform:uppercase}
.btnMenu small{color:var(--gris);font-size:13px}
#resumenHoy{background:var(--azul);color:var(--blanco);border-radius:16px;padding:14px 16px;margin-bottom:16px;
            font-size:14px;border-left:6px solid var(--amarillo)}
#resumenHoy b{color:var(--amarillo);font-size:22px}

/* ---------- Vacaciones ---------- */
#selAnyo{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:10px}
#selAnyo button{background:var(--azul);color:var(--blanco);border:none;border-radius:10px;width:38px;height:38px;font-size:18px}
#selAnyo b{font-size:20px}
#leyenda{display:flex;flex-wrap:wrap;gap:8px;background:var(--blanco);border-radius:12px;padding:10px;margin-bottom:12px;
         box-shadow:0 2px 6px rgba(0,40,85,.1)}
.chipTrab{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600}
.chipTrab i{width:14px;height:14px;border-radius:4px;display:inline-block}
.mes{background:var(--blanco);border-radius:12px;padding:10px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,40,85,.1)}
.mes h3{text-align:center;font-size:15px;text-transform:uppercase;margin-bottom:6px;color:var(--azul)}
.gridDias{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.gridDias .cab{font-size:10px;text-align:center;color:var(--gris);font-weight:700}
.dia{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:7px;
     background:#F3F5F9;position:relative;font-weight:600;color:var(--azul)}
.dia.vacio{background:transparent}
.dia.finde{color:#B0B8C6}
.dia.seleccionado{outline:3px solid var(--rojo);outline-offset:-3px;z-index:1}
.dia.hoy{box-shadow:inset 0 0 0 2px var(--amarillo)}
#barraSel{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:var(--azul);color:var(--blanco);
          padding:12px 14px;display:none;gap:10px;align-items:center;z-index:60;border-top:3px solid var(--amarillo)}
#barraSel span{flex:1;font-size:14px;font-weight:700}
#barraSel button{padding:11px 16px;border:none;border-radius:10px;font-weight:700;font-size:14px}
#btnAsignar{background:var(--amarillo);color:var(--azul)}
#btnCancelSel{background:transparent;color:var(--blanco);border:1px solid #4A5C77!important}

/* ---------- Disponibilidad ---------- */
.dep{background:var(--blanco);border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,40,85,.1)}
.dep h3{background:var(--azul);color:var(--blanco);padding:10px 14px;font-size:14px;text-transform:uppercase;
        display:flex;justify-content:space-between;align-items:center}
.dep h3 em{font-style:normal;background:var(--amarillo);color:var(--azul);border-radius:20px;padding:2px 10px;font-size:13px}
.trab{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid #EEF1F6}
.trab:last-child{border-bottom:none}
.trab.sel{background:#FFFBD6}
.trab.vac{background:#F0F2F6}
.trab.vac .nombre{color:#A5AEBD}
.trab.vac .color{filter:grayscale(1);opacity:.4}
.trab.vac .check{visibility:hidden}
.trab .color{width:16px;height:16px;border-radius:5px;flex-shrink:0}
.trab .nombre{flex:1;font-weight:600;font-size:15px}
.trab .estado{font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px}
.estado.ok{color:var(--verde)}
.estado.fuera{color:var(--rojo)}
.estado.gris{color:var(--gris)}
.check{width:22px;height:22px;border:2px solid #C6CEDB;border-radius:7px;flex-shrink:0;display:flex;
       align-items:center;justify-content:center;font-size:14px;color:var(--blanco)}
.trab.sel .check{background:var(--azul);border-color:var(--azul)}
#barraFichar{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:var(--azul);
             padding:12px 14px;display:none;gap:10px;z-index:60;border-top:3px solid var(--amarillo)}
#barraFichar button{flex:1;padding:13px;border:none;border-radius:10px;font-weight:800;font-size:14px;text-transform:uppercase}
#btnSalida{background:var(--rojo);color:var(--blanco)}
#btnEntrada{background:var(--verde);color:var(--blanco)}
#barraFichar button:disabled{opacity:.35}

/* ---------- Informes ---------- */
#filtros{background:var(--blanco);border-radius:12px;padding:12px;margin-bottom:12px;display:grid;
         grid-template-columns:1fr 1fr;gap:8px;box-shadow:0 2px 6px rgba(0,40,85,.1)}
#filtros label{font-size:11px;font-weight:700;color:var(--gris);text-transform:uppercase;display:block}
#filtros input,#filtros select{width:100%;padding:8px;border:1px solid #D5DBE6;border-radius:8px;font-size:14px;
                               background:var(--blanco);color:var(--azul)}
#tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
#tabs button{white-space:nowrap;padding:9px 13px;border:none;border-radius:20px;background:var(--blanco);
             color:var(--azul);font-weight:700;font-size:13px;box-shadow:0 1px 4px rgba(0,40,85,.12)}
#tabs button.on{background:var(--azul);color:var(--amarillo)}
.tarjeta{background:var(--blanco);border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,40,85,.1)}
.filaInf{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #EEF1F6;font-size:14px}
.filaInf:last-child{border-bottom:none}
.filaInf b.num{background:var(--fondo);border-radius:8px;padding:3px 10px;font-size:13px}
.regFila{font-size:13px;padding:8px 0;border-bottom:1px solid #EEF1F6}
.regFila:last-child{border-bottom:none}
.regFila .tipoS{color:var(--rojo);font-weight:800}
.regFila .tipoE{color:var(--verde);font-weight:800}
.regFila small{color:var(--gris)}

/* ---------- Modales ---------- */
#velo{position:fixed;inset:0;background:rgba(0,20,45,.55);display:none;z-index:80;align-items:flex-end;justify-content:center}
#modal{background:var(--blanco);width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:18px;
       max-height:80vh;overflow-y:auto}
#modal h2{font-size:17px;text-transform:uppercase;margin-bottom:14px;color:var(--azul);border-bottom:3px solid var(--amarillo);
          padding-bottom:8px}
.opcion{display:flex;align-items:center;gap:12px;width:100%;padding:13px;border:none;background:#F3F5F9;
        border-radius:12px;margin-bottom:8px;font-size:15px;font-weight:600;color:var(--azul);text-align:left}
.opcion:active{background:#E2E7F0}
.opcion .ic{font-size:22px}
.opcion i.c{width:16px;height:16px;border-radius:5px}
#modal textarea{width:100%;padding:12px;border:2px solid var(--azul);border-radius:10px;font-size:15px;
                min-height:70px;margin-bottom:10px;font-family:inherit}
.btnPri{width:100%;padding:13px;background:var(--azul);color:var(--amarillo);border:none;border-radius:12px;
        font-weight:800;font-size:15px;text-transform:uppercase}
.btnRojo{background:var(--rojo);color:var(--blanco);border:none;border-radius:8px;padding:7px 12px;font-weight:700;font-size:13px}
.btnCerrar{width:100%;padding:11px;background:none;border:none;color:var(--gris);font-size:14px;margin-top:4px}

/* ---------- Cargando / avisos ---------- */
#cargando{position:fixed;inset:0;background:rgba(0,40,85,.75);display:none;align-items:center;justify-content:center;
          flex-direction:column;z-index:100;color:var(--blanco);gap:14px}
.rueda{width:44px;height:44px;border:5px solid rgba(255,255,255,.25);border-top-color:var(--amarillo);
       border-radius:50%;animation:girar .8s linear infinite}
@keyframes girar{to{transform:rotate(360deg)}}
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--azul);color:var(--blanco);
       padding:11px 20px;border-radius:30px;font-size:14px;font-weight:700;display:none;z-index:110;
       border:2px solid var(--amarillo);max-width:90%;text-align:center}
.msjVacio{text-align:center;color:var(--gris);padding:30px 10px;font-size:14px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="vLogin">
  <img id="imgLogin" alt="Cuadrante Automoción">
  <h1>Cuadrante <span>Automoción</span></h1>
  <p>Acceso restringido al gestor</p>
  <div style="position:fixed;bottom:10px;right:14px;color:#5A6E8C;font-size:11px;font-weight:700">v5</div>
  <input type="password" id="inpPass" inputmode="numeric" placeholder="••••" autocomplete="off">
  <label style="color:#B9C4D6;font-size:14px;margin-top:14px;display:flex;align-items:center;gap:8px">
    <input type="checkbox" id="chkRecordar" checked style="width:18px;height:18px"> Recordar este dispositivo
  </label>
  <button onclick="entrar()">Entrar</button>
  <div id="loginError">Contraseña incorrecta</div>
</div>

<!-- BARRA SUPERIOR -->
<div id="barra">
  <button id="btnAtras" onclick="irA('menu')">‹</button>
  <div id="barraTitulo">Menú</div>
  <button onclick="recargar()" title="Actualizar">⟳</button>
</div>

<!-- MENÚ -->
<div class="vista" id="vMenu">
  <div id="resumenHoy"></div>
  <button class="btnMenu" onclick="irA('vacaciones')">
    <img id="imgCal" alt="">
    <div><b>Gestionar vacaciones</b><small>Calendario anual por trabajador</small></div>
  </button>
  <button class="btnMenu" onclick="irA('disponibilidad')">
    <img id="imgDisp" alt="">
    <div><b>Disponibilidad y fichaje</b><small>Entradas / salidas por departamento</small></div>
  </button>
  <button class="btnMenu" onclick="irA('informes')">
    <div class="emoji">📊</div>
    <div><b>Gestión de informes</b><small>Histórico, ausencias, vacaciones y motivos</small></div>
  </button>
  <button onclick="cerrarSesion()" style="width:100%;background:none;border:none;color:#8A94A6;font-size:13px;padding:10px;text-decoration:underline">
    Cerrar sesión en este dispositivo
  </button>
</div>

<!-- VACACIONES -->
<div class="vista" id="vVacaciones">
  <div id="selAnyo">
    <button onclick="cambiarAnyo(-1)">‹</button><b id="txtAnyo"></b><button onclick="cambiarAnyo(1)">›</button>
  </div>
  <div id="leyenda"></div>
  <div id="calAnual"></div>
</div>
<div id="barraSel">
  <span id="txtSel"></span>
  <button id="btnCancelSel" onclick="cancelarSeleccion()">Cancelar</button>
  <button id="btnAsignar" onclick="abrirAsignar()">Asignar</button>
</div>

<!-- DISPONIBILIDAD -->
<div class="vista" id="vDisponibilidad"><div id="listaDeps"></div></div>
<div id="barraFichar">
  <button id="btnEntrada" onclick="prepararEntrada()">✔ Entrada</button>
  <button id="btnSalida" onclick="prepararSalida()">✖ Salida</button>
</div>

<!-- INFORMES -->
<div class="vista" id="vInformes">
  <div id="filtros">
    <div><label>Desde</label><input type="date" id="fDesde"></div>
    <div><label>Hasta</label><input type="date" id="fHasta"></div>
    <div><label>Trabajador</label><select id="fTrab"><option value="">Todos</option></select></div>
    <div><label>Departamento</label><select id="fDep"><option value="">Todos</option></select></div>
  </div>
  <div id="tabs">
    <button class="on" data-tab="historico" onclick="verTab(this)">Histórico</button>
    <button data-tab="ausencias" onclick="verTab(this)">Ausencias</button>
    <button data-tab="vacas" onclick="verTab(this)">Vacaciones</button>
    <button data-tab="motivos" onclick="verTab(this)">Motivos</button>
  </div>
  <div id="contInforme"></div>
</div>

<!-- MODAL -->
<div id="velo" onclick="if(event.target===this)cerrarModal()"><div id="modal"></div></div>

<!-- CARGANDO / TOAST -->
<div id="cargando"><div class="rueda"></div><b>Cargando…</b></div>
<div id="toast"></div>

<script>
/* ============================ ESTADO GLOBAL ============================ */
var D = null;                 // datos de la app (getDatosApp)
var vistaActual = 'menu';
var anyo = new Date().getFullYear();
var diasSel = [];             // días seleccionados en el calendario
var trabsSel = [];            // trabajadores seleccionados para fichar
var tabInforme = 'historico';
var registrosCache = [];      // registros cargados para informes
var MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

document.getElementById('inpPass').addEventListener('keydown', function(e){ if(e.key==='Enter') entrar(); });

// Asignar las imagenes incrustadas (escudo en el login, miniaturas del menu e icono de la app)
document.getElementById('imgLogin').src = IMG_ICONO;
document.getElementById('imgCal').src = IMG_CALENDARIO;
document.getElementById('imgDisp').src = IMG_DISPONIBILIDAD;
(function(){
  var l1=document.createElement('link'); l1.rel='icon'; l1.href=IMG_ICONO; document.head.appendChild(l1);
  var l2=document.createElement('link'); l2.rel='apple-touch-icon'; l2.href=IMG_ICONO; document.head.appendChild(l2);
})();

/* ============================ UTILIDADES ============================ */
function cargando(v){ document.getElementById('cargando').style.display = v ? 'flex' : 'none'; }
function toast(msg){
  var t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._tm); t._tm = setTimeout(function(){ t.style.display = 'none'; }, 2600);
}
function errorSrv(e){ cargando(false); toast('Error: ' + (e.message || e)); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function trabajador(n){ for(var i=0;i<D.trabajadores.length;i++) if(D.trabajadores[i].nombre===n) return D.trabajadores[i]; return null; }
function estaDeVacaciones(nombre, fecha){
  return D.vacaciones.some(function(v){ return v.trabajador===nombre && v.fecha===fecha; });
}
function iconoMotivo(m){
  for(var i=0;i<D.motivos.length;i++) if(D.motivos[i].nombre.toLowerCase()===String(m).toLowerCase()) return D.motivos[i].icono;
  return '📝';
}

/* ============================ LOGIN ============================ */
function guardarToken(t){ try { localStorage.setItem('cuadranteToken', t); } catch(e){} }
function leerToken(){ try { return localStorage.getItem('cuadranteToken'); } catch(e){ return null; } }
function borrarToken(){ try { localStorage.removeItem('cuadranteToken'); } catch(e){} }

function accederApp(){
  google.script.run.withSuccessHandler(function(datos){
    D = datos; cargando(false);
    document.getElementById('vLogin').style.display = 'none';
    document.getElementById('barra').style.display = 'flex';
    irA('menu');
  }).withFailureHandler(errorSrv).getDatosApp();
}

function entrar(){
  var p = document.getElementById('inpPass').value;
  if(!p) return;
  cargando(true);
  google.script.run.withSuccessHandler(function(res){
    if(res && res.ok){
      if(document.getElementById('chkRecordar').checked && res.token) guardarToken(res.token);
      accederApp();
    } else {
      cargando(false);
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('inpPass').value = '';
    }
  }).withFailureHandler(errorSrv).comprobarPassword(p);
}

// Dispositivo recordado: entrar directamente sin pedir el PIN
(function(){
  var t = leerToken();
  if(!t) return;
  try {
    cargando(true);
    google.script.run.withSuccessHandler(function(ok){
      if(ok){ accederApp(); }
      else { borrarToken(); cargando(false); } // contraseña cambiada: pedir PIN de nuevo
    }).withFailureHandler(function(){ cargando(false); }).comprobarToken(t);
  } catch(e){ cargando(false); }
})();

function cerrarSesion(){
  borrarToken();
  toast('Dispositivo olvidado');
  setTimeout(function(){ location.reload(); }, 800);
}

/* ============================ NAVEGACIÓN ============================ */
function irA(v){
  vistaActual = v;
  ['vMenu','vVacaciones','vDisponibilidad','vInformes'].forEach(function(id){
    document.getElementById(id).classList.remove('activa');
  });
  cancelarSeleccion(); limpiarSelTrabs(); cerrarModal();
  var titulos = {menu:'Cuadrante Automoción', vacaciones:'Vacaciones', disponibilidad:'Disponibilidad', informes:'Informes'};
  document.getElementById('barraTitulo').textContent = titulos[v];
  document.getElementById('btnAtras').style.visibility = v==='menu' ? 'hidden' : 'visible';
  if(v==='menu'){ document.getElementById('vMenu').classList.add('activa'); pintarMenu(); }
  if(v==='vacaciones'){ document.getElementById('vVacaciones').classList.add('activa'); pintarVacaciones(); }
  if(v==='disponibilidad'){ document.getElementById('vDisponibilidad').classList.add('activa'); pintarDisponibilidad(); }
  if(v==='informes'){ document.getElementById('vInformes').classList.add('activa'); iniciarInformes(); }
  window.scrollTo(0,0);
}
function recargar(){
  cargando(true);
  google.script.run.withSuccessHandler(function(datos){
    D = datos; cargando(false); irA(vistaActual); toast('Datos actualizados');
  }).withFailureHandler(errorSrv).getDatosApp();
}

/* ============================ MENÚ ============================ */
function estadoDe(nombre){
  // 'vac' | 'fuera' | 'ok'
  if(estaDeVacaciones(nombre, D.hoy)) return {tipo:'vac'};
  var r = D.estadoHoy[nombre];
  if(r && r.tipo==='SALIDA') return {tipo:'fuera', motivo:r.motivo, detalle:r.detalle, hora:r.hora};
  return {tipo:'ok', hora: r ? r.hora : ''};
}
function pintarMenu(){
  var total = D.trabajadores.length, disp = 0;
  D.trabajadores.forEach(function(t){ if(estadoDe(t.nombre).tipo==='ok') disp++; });
  document.getElementById('resumenHoy').innerHTML =
    'Disponibles ahora mismo: <b>' + disp + '</b> / ' + total + ' trabajadores';
}

/* ============================ VACACIONES ============================ */
function cambiarAnyo(d){ anyo += d; pintarVacaciones(); }
function pintarVacaciones(){
  document.getElementById('txtAnyo').textContent = anyo;

  // Leyenda de trabajadores
  var ley = '';
  D.trabajadores.forEach(function(t){
    ley += '<span class="chipTrab"><i style="background:'+t.color+'"></i>'+esc(t.nombre)+'</span>';
  });
  document.getElementById('leyenda').innerHTML = ley;

  // Índice fecha -> trabajadores
  var porFecha = {};
  D.vacaciones.forEach(function(v){
    if(v.fecha.substring(0,4) != anyo) return;
    (porFecha[v.fecha] = porFecha[v.fecha] || []).push(v.trabajador);
  });

  var html = '';
  for(var m=0; m<12; m++){
    html += '<div class="mes"><h3>'+MESES[m]+'</h3><div class="gridDias">';
    ['L','M','X','J','V','S','D'].forEach(function(d){ html += '<div class="cab">'+d+'</div>'; });
    var primero = new Date(anyo, m, 1);
    var hueco = (primero.getDay()+6)%7;           // lunes = 0
    for(var i=0;i<hueco;i++) html += '<div class="dia vacio"></div>';
    var nDias = new Date(anyo, m+1, 0).getDate();
    for(var d=1; d<=nDias; d++){
      var f = anyo + '-' + ('0'+(m+1)).slice(-2) + '-' + ('0'+d).slice(-2);
      var quienes = porFecha[f] || [];
      var estilo = '', clase = 'dia';
      var diaSem = new Date(anyo, m, d).getDay();
      if(diaSem===0 || diaSem===6) clase += ' finde';
      if(f===D.hoy) clase += ' hoy';
      if(diasSel.indexOf(f)!==-1) clase += ' seleccionado';
      if(quienes.length===1){
        var t = trabajador(quienes[0]);
        estilo = 'background:'+(t?t.color:'#999')+';color:#fff;';
      } else if(quienes.length>1){
        // Rayas con los colores de cada trabajador
        var paso = 100/quienes.length, partes = [];
        quienes.forEach(function(q,i){
          var c = (trabajador(q)||{}).color || '#999';
          partes.push(c+' '+(i*paso)+'% '+((i+1)*paso)+'%');
        });
        estilo = 'background:repeating-linear-gradient(45deg,'+partes.join(',')+');color:#fff;text-shadow:0 0 3px rgba(0,0,0,.6);';
      }
      html += '<div class="'+clase+'" style="'+estilo+'" onclick="tocarDia(\''+f+'\','+quienes.length+')">'+d+'</div>';
    }
    html += '</div></div>';
  }
  document.getElementById('calAnual').innerHTML = html;
  actualizarBarraSel();
}
function tocarDia(f, nVac){
  // Con selección activa (o día vacío): seleccionar/deseleccionar.
  // Día con vacaciones y sin selección activa: ver detalle.
  if(nVac>0 && diasSel.length===0){ verDetalleDia(f); return; }
  var i = diasSel.indexOf(f);
  if(i===-1) diasSel.push(f); else diasSel.splice(i,1);
  pintarVacaciones();
}
function actualizarBarraSel(){
  var b = document.getElementById('barraSel');
  if(diasSel.length && vistaActual==='vacaciones'){
    b.style.display = 'flex';
    document.getElementById('txtSel').textContent = diasSel.length + (diasSel.length===1?' día seleccionado':' días seleccionados');
  } else b.style.display = 'none';
}
function cancelarSeleccion(){ diasSel = []; document.getElementById('barraSel').style.display='none';
  if(vistaActual==='vacaciones' && D) pintarVacaciones(); }

function verDetalleDia(f){
  var quienes = D.vacaciones.filter(function(v){ return v.fecha===f; });
  var partes = f.split('-');
  var h = '<h2>'+partes[2]+' de '+MESES[parseInt(partes[1],10)-1]+' '+partes[0]+'</h2>';
  quienes.forEach(function(v){
    var t = trabajador(v.trabajador);
    h += '<div class="opcion"><i class="c" style="background:'+(t?t.color:'#999')+'"></i>'
       + '<span style="flex:1">'+esc(v.trabajador)+'</span>'
       + '<button class="btnRojo" onclick="quitarVac(\''+f+'\',\''+esc(v.trabajador).replace(/'/g,"\\'")+'\')">Quitar</button></div>';
  });
  h += '<button class="btnPri" onclick="cerrarModal();diasSel=[\''+f+'\'];pintarVacaciones()">Añadir vacaciones este día</button>';
  h += '<button class="btnCerrar" onclick="cerrarModal()">Cerrar</button>';
  abrirModal(h);
}
function quitarVac(f, nombre){
  cerrarModal(); cargando(true);
  google.script.run.withSuccessHandler(function(datos){
    D = datos; cargando(false); pintarVacaciones(); toast('Vacaciones eliminadas');
  }).withFailureHandler(errorSrv).quitarVacacion(f, nombre);
}
function abrirAsignar(){
  var h = '<h2>¿De qué trabajador son estos '+diasSel.length+' día(s)?</h2>';
  D.trabajadores.forEach(function(t){
    h += '<button class="opcion" onclick="asignarA(\''+esc(t.nombre).replace(/'/g,"\\'")+'\')">'
       + '<i class="c" style="background:'+t.color+'"></i>'+esc(t.nombre)
       + ' <small style="color:var(--gris);margin-left:auto">'+esc(t.departamento)+'</small></button>';
  });
  h += '<button class="btnCerrar" onclick="cerrarModal()">Cancelar</button>';
  abrirModal(h);
}
function asignarA(nombre){
  cerrarModal(); cargando(true);
  google.script.run.withSuccessHandler(function(datos){
    D = datos; diasSel = []; cargando(false); pintarVacaciones();
    toast('Vacaciones asignadas a ' + nombre);
  }).withFailureHandler(errorSrv).asignarVacaciones(diasSel, nombre);
}

/* ============================ DISPONIBILIDAD ============================ */
function pintarDisponibilidad(){
  var html = '';
  var deps = D.departamentos.slice();
  // Añadir departamentos que tengan trabajadores pero no estén en la lista
  D.trabajadores.forEach(function(t){ if(deps.indexOf(t.departamento)===-1) deps.push(t.departamento); });

  deps.forEach(function(dep){
    var lista = D.trabajadores.filter(function(t){ return t.departamento===dep; });
    if(!lista.length) return;
    var nDisp = lista.filter(function(t){ return estadoDe(t.nombre).tipo==='ok'; }).length;
    html += '<div class="dep"><h3>'+esc(dep)+'<em>'+nDisp+' / '+lista.length+'</em></h3>';
    lista.forEach(function(t){
      var e = estadoDe(t.nombre);
      var sel = trabsSel.indexOf(t.nombre)!==-1;
      var clases = 'trab' + (sel?' sel':'') + (e.tipo==='vac'?' vac':'');
      var estadoHtml;
      if(e.tipo==='vac')       estadoHtml = '<span class="estado gris">🌴 Vacaciones</span>';
      else if(e.tipo==='fuera')estadoHtml = '<span class="estado fuera">'+iconoMotivo(e.motivo)+' '+esc(e.motivo)
                                           + (e.detalle? ' ('+esc(e.detalle)+')':'') + ' · '+e.hora+'</span>';
      else                     estadoHtml = '<span class="estado ok">✔ Disponible</span>';
      var click = e.tipo==='vac' ? '' : ' onclick="tocarTrab(\''+esc(t.nombre).replace(/'/g,"\\'")+'\')"';
      html += '<div class="'+clases+'"'+click+'>'
            + '<div class="color" style="background:'+t.color+'"></div>'
            + '<div class="nombre">'+esc(t.nombre)+'</div>' + estadoHtml
            + '<div class="check">'+(sel?'✔':'')+'</div></div>';
    });
    html += '</div>';
  });
  document.getElementById('listaDeps').innerHTML = html || '<div class="msjVacio">No hay trabajadores configurados.<br>Añádelos en la pestaña "Trabajadores" de la hoja.</div>';
  actualizarBarraFichar();
}
function tocarTrab(nombre){
  var i = trabsSel.indexOf(nombre);
  if(i===-1) trabsSel.push(nombre); else trabsSel.splice(i,1);
  pintarDisponibilidad();
}
function limpiarSelTrabs(){ trabsSel = []; document.getElementById('barraFichar').style.display='none'; }
function actualizarBarraFichar(){
  var b = document.getElementById('barraFichar');
  if(!trabsSel.length || vistaActual!=='disponibilidad'){ b.style.display='none'; return; }
  b.style.display = 'flex';
  var algunoDisp = false, algunoFuera = false;
  trabsSel.forEach(function(n){
    if(estadoDe(n).tipo==='ok') algunoDisp = true; else algunoFuera = true;
  });
  // Solo se permite la acción coherente con TODOS los seleccionados
  document.getElementById('btnSalida').disabled  = !(algunoDisp && !algunoFuera);
  document.getElementById('btnEntrada').disabled = !(algunoFuera && !algunoDisp);
}
function prepararSalida(){
  var h = '<h2>Motivo de la salida ('+trabsSel.length+')</h2>';
  D.motivos.forEach(function(m){
    var esTaller = m.nombre.trim().toLowerCase() === 'taller';
    var accion = esTaller ? 'pedirTaller()' : 'ficharSalida(\''+esc(m.nombre).replace(/'/g,"\\'")+'\',\'\')';
    h += '<button class="opcion" onclick="'+accion+'">'
       + '<span class="ic">'+m.icono+'</span>'+esc(m.nombre)+'</button>';
  });
  h += '<button class="opcion" onclick="mostrarOtro()"><span class="ic">✏️</span>Otro…</button>';
  h += '<div id="zonaOtro" style="display:none">'
     + '<textarea id="txtOtro" placeholder="Describe el motivo. Se guardará para próximas veces."></textarea>'
     + '<button class="btnPri" onclick="confirmarOtro()">Fichar salida</button></div>';
  h += '<button class="btnCerrar" onclick="cerrarModal()">Cancelar</button>';
  abrirModal(h);
}
function pedirTaller(){
  abrirModal('<h2>&#128295; Nombre del taller</h2>'
    + '<textarea id="txtTaller" placeholder="Escribe el nombre del taller"></textarea>'
    + '<button class="btnPri" onclick="confirmarTaller()">Fichar salida</button>'
    + '<button class="btnCerrar" onclick="cerrarModal()">Cancelar</button>');
  setTimeout(function(){ document.getElementById('txtTaller').focus(); }, 100);
}
function confirmarTaller(){
  var n = document.getElementById('txtTaller').value.trim();
  if(!n){ toast('Escribe el nombre del taller'); return; }
  ficharSalida('Taller', n);
}
function mostrarOtro(){
  document.getElementById('zonaOtro').style.display = 'block';
  document.getElementById('txtOtro').focus();
}
function confirmarOtro(){
  var d = document.getElementById('txtOtro').value.trim();
  if(!d){ toast('Escribe el motivo'); return; }
  ficharSalida('Otro', d);
}
function ficharSalida(motivo, detalle){
  cerrarModal(); cargando(true);
  google.script.run.withSuccessHandler(function(datos){
    D = datos; cargando(false); limpiarSelTrabs(); pintarDisponibilidad();
    toast('Salida registrada');
  }).withFailureHandler(errorSrv).fichar(trabsSel, 'SALIDA', motivo, detalle);
}
function prepararEntrada(){
  cargando(true);
  google.script.run.withSuccessHandler(function(datos){
    D = datos; cargando(false); limpiarSelTrabs(); pintarDisponibilidad();
    toast('Entrada registrada');
  }).withFailureHandler(errorSrv).fichar(trabsSel, 'ENTRADA', '', '');
}

/* ============================ INFORMES ============================ */
function iniciarInformes(){
  // Filtros por defecto: mes actual
  var hoy = D.hoy;
  document.getElementById('fDesde').value = hoy.substring(0,8)+'01';
  document.getElementById('fHasta').value = hoy;
  var sT = document.getElementById('fTrab'), sD = document.getElementById('fDep');
  sT.innerHTML = '<option value="">Todos</option>';
  D.trabajadores.forEach(function(t){ sT.innerHTML += '<option>'+esc(t.nombre)+'</option>'; });
  sD.innerHTML = '<option value="">Todos</option>';
  D.departamentos.forEach(function(d){ sD.innerHTML += '<option>'+esc(d)+'</option>'; });
  ['fDesde','fHasta'].forEach(function(id){ document.getElementById(id).onchange = cargarRegistros; });
  ['fTrab','fDep'].forEach(function(id){ document.getElementById(id).onchange = pintarInforme; });
  cargarRegistros();
}
function cargarRegistros(){
  cargando(true);
  google.script.run.withSuccessHandler(function(regs){
    registrosCache = regs; cargando(false); pintarInforme();
  }).withFailureHandler(errorSrv)
    .getRegistros(document.getElementById('fDesde').value, document.getElementById('fHasta').value);
}
function verTab(btn){
  document.querySelectorAll('#tabs button').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on'); tabInforme = btn.dataset.tab; pintarInforme();
}
function regsFiltrados(){
  var t = document.getElementById('fTrab').value, d = document.getElementById('fDep').value;
  return registrosCache.filter(function(r){
    return (!t || r.trabajador===t) && (!d || r.departamento===d);
  });
}
function minutosATexto(min){
  var h = Math.floor(min/60), m = Math.round(min%60);
  return (h? h+' h ':'') + m + ' min';
}
/** Empareja SALIDA→ENTRADA por trabajador y devuelve duración por motivo y por trabajador. */
function calcularTiempos(regs){
  var orden = regs.slice().sort(function(a,b){ return (a.fecha+a.hora).localeCompare(b.fecha+b.hora); });
  var abiertas = {}, porMotivo = {}, porTrab = {};
  orden.forEach(function(r){
    if(r.tipo==='SALIDA'){ abiertas[r.trabajador] = r; }
    else if(r.tipo==='ENTRADA' && abiertas[r.trabajador]){
      var s = abiertas[r.trabajador];
      if(s.fecha===r.fecha){ // solo se computan ausencias dentro del mismo día
        var min = (parseInt(r.hora.substring(0,2))*60 + parseInt(r.hora.substring(3,5)))
                - (parseInt(s.hora.substring(0,2))*60 + parseInt(s.hora.substring(3,5)));
        if(min>0){
          porMotivo[s.motivo] = (porMotivo[s.motivo]||0) + min;
          porTrab[s.trabajador] = porTrab[s.trabajador] || {ausencias:0, minutos:0};
          porTrab[s.trabajador].minutos += min;
        }
      }
      delete abiertas[r.trabajador];
    }
  });
  // Contar nº de ausencias (salidas)
  regs.forEach(function(r){
    if(r.tipo==='SALIDA'){
      porTrab[r.trabajador] = porTrab[r.trabajador] || {ausencias:0, minutos:0};
      porTrab[r.trabajador].ausencias++;
    }
  });
  return {porMotivo:porMotivo, porTrab:porTrab};
}
function pintarInforme(){
  var c = document.getElementById('contInforme');
  var regs = regsFiltrados();

  if(tabInforme==='historico'){
    if(!regs.length){ c.innerHTML = '<div class="msjVacio">Sin registros en el periodo seleccionado.</div>'; return; }
    var h = '<div class="tarjeta">';
    regs.slice().sort(function(a,b){ return (b.fecha+b.hora).localeCompare(a.fecha+a.hora); })
      .forEach(function(r){
        h += '<div class="regFila"><span class="'+(r.tipo==='SALIDA'?'tipoS':'tipoE')+'">'
           + (r.tipo==='SALIDA'?'✖ SALIDA':'✔ ENTRADA')+'</span> — <b>'+esc(r.trabajador)+'</b>'
           + (r.motivo? ' · '+iconoMotivo(r.motivo)+' '+esc(r.motivo)+(r.detalle? ' ('+esc(r.detalle)+')':''):'')
           + '<br><small>'+r.fecha+' · '+r.hora+' · '+esc(r.departamento)+'</small></div>';
      });
    c.innerHTML = h + '</div>';
  }

  if(tabInforme==='ausencias'){
    var t = calcularTiempos(regs).porTrab;
    var nombres = Object.keys(t).sort(function(a,b){ return t[b].minutos - t[a].minutos; });
    if(!nombres.length){ c.innerHTML = '<div class="msjVacio">Sin ausencias en el periodo seleccionado.</div>'; return; }
    var h = '<div class="tarjeta">';
    nombres.forEach(function(n){
      h += '<div class="filaInf"><span><b>'+esc(n)+'</b><br><small style="color:var(--gris)">'
         + t[n].ausencias+' salida(s)</small></span><b class="num">'+minutosATexto(t[n].minutos)+'</b></div>';
    });
    c.innerHTML = h + '</div>';
  }

  if(tabInforme==='vacas'){
    // Días de vacaciones por trabajador dentro del periodo (con filtros)
    var desde = document.getElementById('fDesde').value, hasta = document.getElementById('fHasta').value;
    var fT = document.getElementById('fTrab').value, fD = document.getElementById('fDep').value;
    var cuenta = {};
    D.vacaciones.forEach(function(v){
      if(v.fecha < desde || v.fecha > hasta) return;
      if(fT && v.trabajador!==fT) return;
      var tr = trabajador(v.trabajador);
      if(fD && (!tr || tr.departamento!==fD)) return;
      cuenta[v.trabajador] = (cuenta[v.trabajador]||0)+1;
    });
    var nombres2 = Object.keys(cuenta).sort(function(a,b){ return cuenta[b]-cuenta[a]; });
    if(!nombres2.length){ c.innerHTML = '<div class="msjVacio">Sin vacaciones en el periodo seleccionado.</div>'; return; }
    var h2 = '<div class="tarjeta">';
    nombres2.forEach(function(n){
      var tr = trabajador(n);
      h2 += '<div class="filaInf"><span style="display:flex;align-items:center;gap:8px">'
          + '<i style="width:14px;height:14px;border-radius:4px;background:'+(tr?tr.color:'#999')+'"></i>'
          + '<b>'+esc(n)+'</b></span><b class="num">'+cuenta[n]+' día(s)</b></div>';
    });
    c.innerHTML = h2 + '</div>';
  }

  if(tabInforme==='motivos'){
    var pm = calcularTiempos(regs).porMotivo;
    var motivos = Object.keys(pm).sort(function(a,b){ return pm[b]-pm[a]; });
    if(!motivos.length){ c.innerHTML = '<div class="msjVacio">Sin tiempos computados.<br><small>Se calculan cuando hay una salida y su entrada el mismo día.</small></div>'; return; }
    var h3 = '<div class="tarjeta">';
    motivos.forEach(function(m){
      h3 += '<div class="filaInf"><span>'+iconoMotivo(m)+' <b>'+esc(m)+'</b></span>'
          + '<b class="num">'+minutosATexto(pm[m])+'</b></div>';
    });
    c.innerHTML = h3 + '</div>';
  }
}

/* ============================ MODAL ============================ */
function abrirModal(html){
  document.getElementById('modal').innerHTML = html;
  document.getElementById('velo').style.display = 'flex';
}
function cerrarModal(){ document.getElementById('velo').style.display = 'none'; }
